<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel da Gerência</title>

  <!-- CSS principal -->
  <link rel="stylesheet" href="painel_gerencia.css">

</head>

<body>

<!--<button id="btnDarkMode">☽ Dark Mode</button>-->

<div class="card">

  <h2>Painel da Gerência <span class="badge">EDIÇÃO ATIVA</span></h2>

  <div class="info-box">
    ℹ️ <strong>Importante:</strong>
    Esta página mostra e edita os dados da aba
    <strong>"Página2_Editado"</strong>.
    Os dados originais estão protegidos na aba
    <strong>"Página2"</strong>.
  </div>

  <div class="row">
    <button id="btnRecarregar" class="btn-green">⟲ Recarregar dados</button>
    <button id="btnCopiarDados" class="btn-primary">❐ Copiar dados originais</button>
    <button id="btnModoEdicao" class="btn-orange">✒ Modo Edição</button>
    <a href="index.html" class="btn btn-gray">← Voltar ao formulário</a>
  </div>

  <div id="filters">
    <label><strong>Filtrar por:</strong></label>

    <select id="campoFiltro">
      <option value="">Todos os campos</option>
      <option value="Mes_Competencia">Mês</option>
      <option value="Ano_Competencia">Ano</option>
      <option value="Matricula">Matrícula</option>
      <option value="Email">E-mail</option>
      <option value="Setor_Nucleo">Setor</option>
    </select>

    <input id="filtroValor" placeholder="Digite para filtrar..." style="width:250px">

    <button id="btnLimparFiltro" class="btn-gray">✖ Limpar</button>

    <button id="btnDashboard" class="btn-gray">
  📊 Dashboard
</button>
  </div>

  <div id="indicadorTotal" style="margin: 10px 0; font-weight: bold;">
    Total de respostas: <span id="totalRespostas">0</span>
  </div>
  <div id="dashboardWrap" class="dashboard oculto">
  <canvas id="dashboardChart"></canvas>
</div>

  <div id="statusUser"></div>

  <!-- 🔥 TABELA SEMPRE AQUI DENTRO -->
  <div id="tabelaWrapUser"></div>

</div>

<!-- MODAL DE EDIÇÃO -->
<div id="modalEdicao" class="modal">
  <div class="modal-conteudo">
    <h3>✎ Editar Célula</h3>

    <label for="editCampo">Campo:</label>
    <input id="editCampo" readonly>

    <label for="editMatricula">Matrícula:</label>
    <input id="editMatricula" readonly>

    <label for="editValorAtual">Valor Atual:</label>
    <input id="editValorAtual" readonly>

    <label for="editNovoValor">Novo Valor:</label>
    <input id="editNovoValor" type="text">

    <div class="row" style="justify-content:flex-end; margin-top:12px;">
      <button id="btnCancelarEdicao" class="btn-red">Cancelar</button>
      <button id="btnSalvarEdicao" class="btn-green">💾 Salvar</button>
    </div>

    <div id="debugInfo" class="debug-info"></div>
  </div>
</div>

<!-- JS -->
<script>
  const btnDark = document.getElementById('btnDarkMode');

  if (localStorage.getItem('darkMode') === 'on') {
    document.body.classList.add('dark');
    btnDark.textContent = '☼ Light Mode';
  }

  btnDark.addEventListener('click', () => {
    const isDark = document.body.classList.toggle('dark');
    btnDark.textContent = isDark ? '☼ Light Mode' : '☽ Dark Mode';
    localStorage.setItem('darkMode', isDark ? 'on' : 'off');
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="painel_gerencia.js" defer></script>

</body>
</html>
